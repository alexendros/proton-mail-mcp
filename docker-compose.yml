# Dokploy docker-compose para proton-mail-mcp en HTTP mode.
#
# Este stack arranca:
#   - bridge: Proton Mail Bridge headless (imagen community `shenxn/protonmail-bridge`)
#             con vault persistido en volumen
#   - mcp:    el MCP server en modo HTTP, hablando con bridge por red interna
#
# IMPORTANTE: el primer arranque requiere login one-off interactivo en bridge-cli:
#   ssh dokploy
#   docker compose -f /etc/dokploy/compose/<app>/code/docker-compose.yml \
#                  run --rm bridge /bin/bash -c "/app/Bridge --cli"
#   Dentro: login → 2FA → info (copiar "bridge password") → exit
#   Pegar el bridge password en PROTON_BRIDGE_PASS (env del compose en Dokploy)
#
# Tras el login inicial, el volumen `bridge-data` persiste el vault y los
# siguientes arranques son automáticos.
#
# Traefik: el routing a `protonmail.alexendros.me` lo gestiona Dokploy creando
# el dominio via API (compose.create + domain.create). Este compose NO declara
# labels Traefik manualmente — Dokploy los inyecta durante el deploy.

services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: proton-mail-mcp-bridge:latest
    restart: unless-stopped
    volumes:
      - bridge-data:/root
    expose:
      - "1143"
      - "1025"
    networks:
      - proton-net
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1143"]
      interval: 30s
      timeout: 5s
      retries: 5

  mcp:
    build: .
    restart: unless-stopped
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      PROTON_BRIDGE_HOST: bridge
      PROTON_BRIDGE_IMAP_PORT: 1143
      PROTON_BRIDGE_SMTP_PORT: 1025
      PROTON_BRIDGE_USER: ${PROTON_BRIDGE_USER}
      PROTON_BRIDGE_PASS: ${PROTON_BRIDGE_PASS}
      PROTON_MAIL_FROM: ${PROTON_MAIL_FROM}
      PROTON_BRIDGE_TLS_INSECURE: "true"
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8787
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8787"
    networks:
      - proton-net
      - dokploy-network

volumes:
  bridge-data:

networks:
  proton-net:
    driver: bridge
  dokploy-network:
    external: true
