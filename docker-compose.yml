# Dokploy docker-compose for proton-mail-mcp in HTTP mode.
#
# This stack runs:
#   - bridge: Proton Mail Bridge headless (bridge-cli) with `pass` keychain backend
#   - mcp: the MCP server, talking to bridge over the internal Docker network
#
# IMPORTANT: Initial login to bridge-cli must be done INTERACTIVELY once per deploy.
# See README.md > "Modo B: VPS Dokploy" for the one-off setup commands.
#
# After that, Bridge's vault is persisted in the `bridge-data` volume and the
# container restarts autonomously.

services:
  bridge:
    # Use the community-maintained headless image; pin a specific tag in production.
    # Build your own from https://github.com/ProtonMail/proton-bridge if you prefer.
    image: shenxn/protonmail-bridge:latest
    restart: unless-stopped
    volumes:
      - bridge-data:/root
    # Expose IMAP/SMTP only on the internal network, not on the host.
    expose:
      - "1143"
      - "1025"
    networks:
      - proton-net
    # Initial login requires TTY:
    #   docker compose run --rm bridge /bin/bash -c "/app/Bridge --cli"
    #   Then inside: login → complete 2FA → info (to see bridge password) → exit
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1143"]
      interval: 30s
      timeout: 5s
      retries: 5

  mcp:
    build: .
    restart: unless-stopped
    depends_on:
      bridge:
        condition: service_healthy
    environment:
      PROTON_BRIDGE_HOST: bridge
      PROTON_BRIDGE_IMAP_PORT: 1143
      PROTON_BRIDGE_SMTP_PORT: 1025
      PROTON_BRIDGE_USER: ${PROTON_BRIDGE_USER}
      PROTON_BRIDGE_PASS: ${PROTON_BRIDGE_PASS}
      PROTON_MAIL_FROM: ${PROTON_MAIL_FROM}
      PROTON_BRIDGE_TLS_INSECURE: "true"
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8787
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Dokploy handles TLS termination via Traefik. Expose only internally.
    expose:
      - "8787"
    networks:
      - proton-net
    labels:
      # Dokploy/Traefik labels — adjust domain to yours
      - "traefik.enable=true"
      - "traefik.http.routers.proton-mcp.rule=Host(`protonmail.alexendros.me`)"
      - "traefik.http.routers.proton-mcp.entrypoints=websecure"
      - "traefik.http.routers.proton-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.proton-mcp.loadbalancer.server.port=8787"

volumes:
  bridge-data:

networks:
  proton-net:
    driver: bridge
